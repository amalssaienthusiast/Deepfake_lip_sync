version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phonemesync-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - REDIS_URL=redis://redis:6379/0
      - DEVICE=cpu
      - LOG_LEVEL=INFO
      - UPLOAD_DIR=/app/tmp/uploads
      - OUTPUT_DIR=/app/tmp/outputs
      - WAV2LIP_WEIGHTS=/app/app/ml/weights/wav2lip_gan.pth
      - FACE_DETECTOR_WEIGHTS=/app/app/ml/weights/s3fd.pth
      - WHISPER_MODEL_SIZE=base
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:3001"]
    volumes:
      # Model weights (read-only) — populate with: scripts/download_weights.sh
      - ./app/ml/weights:/app/app/ml/weights:ro
      # Persistent storage for uploads and outputs
      - phonemesync-tmp:/app/tmp
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s   # allow time for model loading
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: phonemesync-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  phonemesync-tmp:
  redis-data:
